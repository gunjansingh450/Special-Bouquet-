<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Surprise ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
    overflow:hidden;
    transition:1s;
}

/* Floating Hearts */
.heart{
    position:absolute;
    width:20px;
    height:20px;
    background:#ff4b6e;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
    opacity:0.6;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:20px;
    height:20px;
    background:#ff4b6e;
    border-radius:50%;
}

.heart::before{ top:-10px; left:0; }
.heart::after{ left:-10px; top:0; }

@keyframes float{
    0%{ transform: translateY(100vh) rotate(45deg); opacity:0; }
    50%{ opacity:0.8; }
    100%{ transform: translateY(-10vh) rotate(45deg); opacity:0; }
}

/* Card */
.card{
    background:white;
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    position:relative;
    z-index:10;
}

.card h1{
    color:#ff4b6e;
    margin-bottom:15px;
}

.card p{
    color:#555;
    margin-bottom:30px;
}

/* Button */   
.btn{
    padding:15px 40px;
    background: linear-gradient(45deg, #ff4b6e, #ff758c);
    color:white;
    border:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:0.4s;
    animation: pulse 2s infinite;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 15px 35px rgba(255, 75, 110, 0.6);
}

@keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(255,75,110,0.7); }
    70%{ box-shadow:0 0 0 20px rgba(255,75,110,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,75,110,0); }
}

/* Ripple Effect */
.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.7);
    transform:scale(0);
    animation:rippleEffect 0.6s linear;
}

@keyframes rippleEffect{
    to{
        transform:scale(4);
        opacity:0;
    }
}
td
/* Fade Out Animation */
.fade-out{
    animation: fadeOut 1.2s forwards;
}

@keyframes fadeOut{
    to{
        opacity:0;
        transform:scale(1.2);
    }
}

</style>
</head>

<body>

<script>
/* Floating Hearts */
for(let i=0; i<25; i++){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    heart.style.width = heart.style.height = (Math.random() * 15 + 10) + "px";
    document.body.appendChild(heart);
}
</script>

<div class="card">
    <h1>💖 A Special Surprise For You 💖</h1>
    <p>Click below to open your beautiful bouquet ❤️</p>
    <button class="btn" onclick="openBouquet(event)">
        Open Your Bouquet 🌸
    </button>
</div>

<script>
function openBouquet(e){

    /* Ripple */
    const button = e.currentTarget;
    const circle = document.createElement("span");
    const diameter = Math.max(button.clientWidth, button.clientHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = `${diameter}px`;
    circle.style.left = `${e.clientX - button.offsetLeft - radius}px`;
    circle.style.top = `${e.clientY - button.offsetTop - radius}px`;
    circle.classList.add("ripple");

    const ripple = button.getElementsByClassName("ripple")[0];
    if (ripple) ripple.remove();

    button.appendChild(circle);

    /* Heart Burst */
    for(let i=0;i<15;i++){
        let heart = document.createElement("div");
        heart.className="heart";
        heart.style.left = "50%";
        heart.style.top = "50%";
        heart.style.position="fixed";
        heart.style.animationDuration="2s";
        document.body.appendChild(heart);
    }

    /* Fade then redirect */
    document.body.classList.add("fade-out");

    setTimeout(()=>{
        window.location.href="https://digibouquet.vercel.app/bouquet/3104f41d-ff58-481c-81f9-9637203bba18";
    },1200);
}
</script>

</body>
</html>
